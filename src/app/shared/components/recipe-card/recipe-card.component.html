<a
  [routerLink]="['/recipe', recipe.id]"
  class="group card flex flex-col overflow-hidden"
>
  <div class="relative aspect-[4/3] overflow-hidden bg-gray-50">
    <img
      [src]="recipe.image"
      [alt]="recipe.name"
      [appImgFallback]="recipe.name"
      class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
      loading="lazy"
    />
    <span
      class="absolute left-2 top-2 rounded-full bg-black/60 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-wider text-white backdrop-blur"
    >{{ recipe.cuisine }}</span>
    <span
      *ngIf="recipe.difficulty"
      class="absolute right-2 top-2 rounded-full px-2.5 py-1 text-[10px] font-semibold uppercase tracking-wider text-white"
      [class.bg-emerald-500]="recipe.difficulty === 'Easy'"
      [class.bg-amber-500]="recipe.difficulty === 'Medium'"
      [class.bg-red-500]="recipe.difficulty === 'Hard'"
    >{{ recipe.difficulty }}</span>
  </div>

  <div class="flex flex-1 flex-col gap-2 p-3 sm:p-4">
    <h3 class="line-clamp-1 text-sm font-semibold text-gray-900 group-hover:text-primary sm:text-base">
      {{ recipe.name }}
    </h3>

    <app-rating-stars
      [rating]="recipe.rating"
      [count]="recipe.reviewCount"
    ></app-rating-stars>

    <div class="mt-auto grid grid-cols-3 gap-2 text-[11px] text-gray-500">
      <span class="flex items-center gap-1">
        <i-lucide [img]="icons['Clock']" class="h-3.5 w-3.5"></i-lucide>
        {{ totalTime }}m
      </span>
      <span class="flex items-center gap-1">
        <i-lucide [img]="icons['Users']" class="h-3.5 w-3.5"></i-lucide>
        {{ recipe.servings }}
      </span>
      <span class="flex items-center gap-1">
        <i-lucide [img]="icons['Flame']" class="h-3.5 w-3.5"></i-lucide>
        {{ recipe.caloriesPerServing }} kcal
      </span>
    </div>
  </div>
</a>
