<div class="flex items-center gap-1.5" [attr.aria-label]="ariaLabel()">
  <div class="flex items-center" aria-hidden="true">
    <ng-container *ngFor="let kind of stars(); let i = index; trackBy: trackByIndex">
      <i-lucide
        *ngIf="kind === 'full'"
        [img]="icons['Star']"
        [class]="sizeClass + ' text-yellow-400'"
        fill="currentColor"
      ></i-lucide>
      <i-lucide
        *ngIf="kind === 'half'"
        [img]="icons['StarHalf']"
        [class]="sizeClass + ' text-yellow-400'"
        fill="currentColor"
      ></i-lucide>
      <i-lucide
        *ngIf="kind === 'empty'"
        [img]="icons['Star']"
        [class]="sizeClass + ' text-gray-300'"
        fill="none"
      ></i-lucide>
    </ng-container>
  </div>
  <span *ngIf="showCount && count !== null" class="text-xs text-gray-500">({{ count }} Reviews)</span>
</div>
