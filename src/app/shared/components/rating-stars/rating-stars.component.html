<div class="flex items-center gap-1.5" [attr.aria-label]="ariaLabel()">
  <div class="flex items-center" aria-hidden="true">
    <i-lucide
      *ngFor="let i of stars(); trackBy: trackByIndex"
      [img]="icons['Star']"
      class="h-4 w-4"
      [class.text-yellow-400]="i <= filled()"
      [class.text-gray-300]="i > filled()"
      [attr.fill]="i <= filled() ? 'currentColor' : 'none'"
    ></i-lucide>
  </div>
  <span *ngIf="showCount && count !== null" class="text-xs text-gray-500">({{ count }})</span>
</div>
