<div class="min-h-screen bg-gray-50">
  <app-navbar></app-navbar>

  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-8 lg:px-8">

    <!-- Slider -->
    <app-slider [slides]="slides"></app-slider>

    <!-- Section header -->
    <div id="products" class="mt-8 flex items-center justify-between">
      <div>
        <h2 class="text-xl font-bold text-gray-900 sm:text-2xl">Featured Products</h2>

        <!-- Category filter badge — only shown when navigated from /categories -->
        <div *ngIf="activeCategory() !== 'all'" class="mt-1.5 flex items-center gap-2">
          <span class="inline-flex items-center gap-1.5 rounded-full bg-primary-50 px-3 py-1 text-xs font-semibold capitalize text-primary">
            {{ activeCategory() }}
          </span>
          <button
            type="button"
            (click)="clearCategory()"
            class="inline-flex items-center gap-1 text-xs text-gray-400 hover:text-gray-600"
          >
            <i-lucide [img]="icons['X']" class="h-3 w-3"></i-lucide>
            Clear
          </button>
        </div>
      </div>

      <!-- View All — hidden once already showing all -->
      <button
        *ngIf="!showingAll() && activeCategory() === 'all'"
        type="button"
        (click)="loadAll()"
        class="text-sm font-semibold text-primary hover:underline"
      >View All</button>
    </div>

    <!-- Product grid -->
    <div class="mt-6">
      <app-product-grid
        [products]="products()"
        [loading]="loading()"
        [showViewAll]="false"
        emptyText="No products found."
      ></app-product-grid>
    </div>

  </main>

  <app-footer></app-footer>
</div>
