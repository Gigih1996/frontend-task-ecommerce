<div class="min-h-screen bg-gray-50">
  <app-navbar></app-navbar>

  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-8 lg:px-8">
    <header class="rounded-2xl bg-gradient-to-br from-amber-100 via-orange-50 to-rose-50 p-6 sm:p-10">
      <p class="text-xs font-semibold uppercase tracking-wider text-primary sm:text-sm">
        Inspirasi Dapur
      </p>
      <h1 class="mt-2 text-2xl font-extrabold leading-tight text-gray-900 sm:text-3xl md:text-4xl">
        Resep Pilihan untuk Setiap Selera
      </h1>
      <p class="mt-2 max-w-xl text-sm text-gray-600 sm:text-base">
        Temukan resep dari berbagai cuisine — pasta Italia, biryani Pakistan, dessert klasik, sampai snack ringan.
      </p>
    </header>

    <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <h2 class="text-xl font-bold text-gray-900 sm:text-2xl">All Recipes</h2>

      <div class="relative w-full sm:max-w-xs">
        <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-gray-400">
          <i-lucide [img]="icons['Search']" class="h-4 w-4"></i-lucide>
        </span>
        <input
          type="search"
          [ngModel]="searchTerm()"
          (ngModelChange)="onSearchChange($event)"
          placeholder="Search recipes..."
          class="input-field"
        />
      </div>
    </div>

    <div class="mt-4 space-y-3">
      <div>
        <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-gray-500">Meal Type</p>
        <div class="flex flex-wrap gap-2">
          <button
            type="button"
            (click)="filterAll()"
            [class.bg-primary]="isActive({ kind: 'all' })"
            [class.text-white]="isActive({ kind: 'all' })"
            [class.bg-white]="!isActive({ kind: 'all' })"
            [class.text-gray-700]="!isActive({ kind: 'all' })"
            class="rounded-full border border-gray-200 px-4 py-1.5 text-xs font-semibold capitalize transition hover:border-primary"
          >All</button>
          <button
            *ngFor="let meal of mealTypes; trackBy: trackByMeal"
            type="button"
            (click)="filterByMeal(meal)"
            [class.bg-primary]="isActive({ kind: 'meal', value: meal })"
            [class.text-white]="isActive({ kind: 'meal', value: meal })"
            [class.bg-white]="!isActive({ kind: 'meal', value: meal })"
            [class.text-gray-700]="!isActive({ kind: 'meal', value: meal })"
            class="rounded-full border border-gray-200 px-4 py-1.5 text-xs font-semibold capitalize transition hover:border-primary"
          >{{ meal }}</button>
        </div>
      </div>

      <div *ngIf="tags().length">
        <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-gray-500">Popular Tags</p>
        <div class="flex flex-wrap gap-2">
          <button
            *ngFor="let tag of tags(); trackBy: trackByTag"
            type="button"
            (click)="filterByTag(tag)"
            [class.bg-primary]="isActive({ kind: 'tag', value: tag })"
            [class.text-white]="isActive({ kind: 'tag', value: tag })"
            [class.bg-white]="!isActive({ kind: 'tag', value: tag })"
            [class.text-gray-700]="!isActive({ kind: 'tag', value: tag })"
            class="rounded-full border border-gray-200 px-4 py-1.5 text-xs font-semibold capitalize transition hover:border-primary"
          >{{ tag }}</button>
        </div>
      </div>
    </div>

    <div class="mt-6">
      <app-loader *ngIf="loading()" label="Loading recipes..."></app-loader>

      <div
        *ngIf="!loading() && recipes().length"
        class="grid grid-cols-1 gap-3 sm:grid-cols-2 sm:gap-4 lg:grid-cols-4"
      >
        <app-recipe-card
          *ngFor="let recipe of recipes(); trackBy: trackByRecipe"
          [recipe]="recipe"
        ></app-recipe-card>
      </div>

      <p
        *ngIf="!loading() && !recipes().length"
        class="rounded-xl border border-dashed border-gray-200 py-12 text-center text-sm text-gray-500"
      >No recipes match your filter.</p>
    </div>
  </main>

  <app-footer></app-footer>
</div>
