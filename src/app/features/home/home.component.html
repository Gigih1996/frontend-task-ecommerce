<div class="min-h-screen bg-gray-50">
  <app-navbar></app-navbar>

  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-8 lg:px-8">
    <app-slider [slides]="slides"></app-slider>

    <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <h2 class="text-xl font-bold text-gray-900 sm:text-2xl">Featured Products</h2>

      <div class="relative w-full sm:max-w-xs">
        <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-gray-400">
          <i-lucide [img]="icons['Search']" class="h-4 w-4"></i-lucide>
        </span>
        <input
          type="search"
          [ngModel]="searchTerm()"
          (ngModelChange)="onSearchChange($event)"
          placeholder="Search products..."
          class="input-field"
        />
      </div>
    </div>

    <div class="mt-4 flex flex-wrap gap-2">
      <button
        type="button"
        (click)="filterByCategory('all')"
        [class.bg-primary]="activeCategory() === 'all'"
        [class.text-white]="activeCategory() === 'all'"
        [class.bg-white]="activeCategory() !== 'all'"
        [class.text-gray-700]="activeCategory() !== 'all'"
        class="rounded-full border border-gray-200 px-4 py-1.5 text-xs font-semibold capitalize transition hover:border-primary"
      >All</button>

      <button
        *ngFor="let cat of categories(); trackBy: trackByCategory"
        type="button"
        (click)="filterByCategory(cat)"
        [class.bg-primary]="activeCategory() === cat"
        [class.text-white]="activeCategory() === cat"
        [class.bg-white]="activeCategory() !== cat"
        [class.text-gray-700]="activeCategory() !== cat"
        class="rounded-full border border-gray-200 px-4 py-1.5 text-xs font-semibold capitalize transition hover:border-primary"
      >{{ cat | titlecase }}</button>
    </div>

    <div class="mt-6">
      <app-product-grid
        [products]="products()"
        [loading]="loading()"
        [showViewAll]="false"
        emptyText="No products match your search."
      ></app-product-grid>
    </div>
  </main>

  <app-footer></app-footer>
</div>
