<div class="flex min-h-screen items-center justify-center bg-gray-50 px-4 py-10">
  <div class="w-full max-w-md rounded-2xl border border-gray-100 bg-white p-8 shadow-sm">
    <ng-container *ngIf="!errorMessage(); else errorTpl">
      <app-loader label="Completing Google sign-in..."></app-loader>
    </ng-container>

    <ng-template #errorTpl>
      <div class="flex flex-col items-center text-center">
        <span class="grid h-12 w-12 place-items-center rounded-full bg-red-100 text-red-600">
          <i-lucide [img]="icons['AlertCircle']" class="h-6 w-6"></i-lucide>
        </span>
        <h1 class="mt-4 text-lg font-bold text-gray-900">Sign-in failed</h1>
        <p class="mt-1 text-sm text-gray-500">{{ errorMessage() }}</p>
        <a routerLink="/login" class="btn-primary mt-5">Back to login</a>
      </div>
    </ng-template>
  </div>
</div>
